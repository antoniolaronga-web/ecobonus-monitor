name: Ecobonus Plafond Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Installa dipendenze Python
        run: |
          pip install --upgrade pip
          pip install requests selenium webdriver-manager
          python -c "import selenium; print('Selenium OK:', selenium.__version__)"

      - name: Controlla plafond
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python check_plafond.py
